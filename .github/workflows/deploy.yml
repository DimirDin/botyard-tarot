name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          rsync -a --exclude='.env' --exclude='.git' . /srv/apps/botyard-tarot/
          cd /srv/apps/botyard-tarot
          docker compose build
          docker compose up -d
          docker compose ps
